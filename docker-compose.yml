services:
  nginx:
    image: nginx:alpine
    container_name: 3dgs-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - 3dgs-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_KAKAO_MAP_KEY=${NEXT_PUBLIC_KAKAO_MAP_KEY}
        - NEXT_PUBLIC_KAKAO_REST_API_KEY=${NEXT_PUBLIC_KAKAO_REST_API_KEY}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: 3dgs-frontend
    expose:
      - "3000"
    env_file: .env
    depends_on:
      backend:
        condition: service_started
    networks:
      - 3dgs-net
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: 3dgs-backend
    expose:
      - "8000"
    volumes:
      - ./core:/app/core:ro
      - ./utilities:/app/utilities:ro
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - MINIO_ENDPOINT=minio:9000
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - 3dgs-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: 3dgs-postgres
    ports:
      - "127.0.0.1:5433:5432"  # Local access only(GPU worker does not need direct access)
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - 3dgs-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: 3dgs-redis
    ports:
      - "${PC_HOST_IP}:6379:6379"   # GPU worker access — bind to PC's LAN IP only
    volumes:
      - redisdata:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - 3dgs-net
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: 3dgs-rabbitmq
    ports:
      - "${PC_HOST_IP}:5673:5672"   # GPU worker access — bind to PC's LAN IP only
      - "127.0.0.1:15673:15672"     # Management UI is local allowed only
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - 3dgs-net
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: 3dgs-minio
    ports:
      - "${PC_HOST_IP}:9000:9000"   # GPU worker access — bind to PC's LAN IP only
      - "127.0.0.1:9000:9000"       # Browser access for presigned URLs (MINIO_PUBLIC_ENDPOINT=localhost:9000)
      - "127.0.0.1:9001:9001"       # Management UI is local allowed only
    volumes:
      - miniodata:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 3dgs-net
    restart: unless-stopped

  flower:
    image: mher/flower
    container_name: 3dgs-flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672//
      - FLOWER_BASIC_AUTH=${FLOWER_USER}:${FLOWER_PASSWORD}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - 3dgs-net
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  miniodata:


networks:
  3dgs-net:
    driver: bridge
