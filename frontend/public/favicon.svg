<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="50%" style="stop-color:#7c4dff"/>
      <stop offset="100%" style="stop-color:#e040fb"/>
    </linearGradient>
    <radialGradient id="splat1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="splat2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c4dff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7c4dff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="splat3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e040fb;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#e040fb;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Gaussian splat particles -->
  <circle cx="180" cy="200" r="80" fill="url(#splat1)"/>
  <circle cx="300" cy="160" r="60" fill="url(#splat2)"/>
  <circle cx="340" cy="280" r="90" fill="url(#splat3)"/>
  <circle cx="220" cy="320" r="70" fill="url(#splat1)"/>
  <circle cx="260" cy="240" r="50" fill="url(#splat2)"/>

  <!-- Building outline -->
  <g fill="none" stroke="url(#glow)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Building body -->
    <path d="M160 380 L160 180 L256 120 L352 180 L352 380"/>
    <!-- Roof -->
    <path d="M140 180 L256 100 L372 180"/>
    <!-- Floor line -->
    <line x1="140" y1="380" x2="372" y2="380"/>
    <!-- Door -->
    <rect x="228" y="300" width="56" height="80" rx="4"/>
    <!-- Windows -->
    <rect x="185" y="220" width="40" height="40" rx="4"/>
    <rect x="287" y="220" width="40" height="40" rx="4"/>
  </g>

  <!-- 3D text accent -->
  <text x="256" y="450" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="48" fill="white" opacity="0.6">3DGS</text>
</svg>
