worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 0;

    # 로깅 ──────────────────────────────────────────────────────────
    log_format main '$real_client_ip - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # 실제 클라이언트 IP ─────────────────────────────────────────────
    map $http_cf_connecting_ip $real_client_ip {
        ""      $remote_addr;
        default $http_cf_connecting_ip;
    }

    # WebSocket upgrade ──────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    map $http_x_forwarded_proto $forwarded_proto {
        ""      $scheme;
        default $http_x_forwarded_proto;
    }

    # Gzip 압축 ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Rate Limiting ──────────────────────────────────────────────────
    # [LOCAL] 개발 편의를 위해 느슨한 제한 (또는 주석 처리하여 비활성화 가능)
    limit_req_zone $real_client_ip zone=api:10m rate=30r/s;
    limit_req_zone $real_client_ip zone=auth:10m rate=30r/m;
    limit_req_zone $real_client_ip zone=minio:10m rate=100r/s;

    # 보안 헤더 ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HTTP 서버 ──────────────────────────────────────────────────────
    server {
        listen 80;

        server_name _;

        resolver 127.0.0.11 valid=10s;

        # Next.js static assets ─────────────────────────────────────
        location ^~ /_next/static/ {
            set $upstream_frontend http://frontend:3000;
            proxy_pass $upstream_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $real_client_ip;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;

            proxy_buffering on;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # Frontend (Next.js) ─────────────────────────────────────────
        location / {
            set $upstream_frontend http://frontend:3000;
            proxy_pass $upstream_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $real_client_ip;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        # Next.js HMR WebSocket ─────────────────────────────────────
        location /_next/webpack-hmr {
            set $upstream_frontend http://frontend:3000;
            proxy_pass $upstream_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $real_client_ip;
        }

        # Swagger UI ────────────────────────────────────────────────
        location /api/docs {

            set $upstream_backend http://backend:8000;
            proxy_pass $upstream_backend;
            proxy_set_header Host $host;
        }

        # OpenAPI Spec ──────────────────────────────────────────────
        location /api/openapi.json {
            # [LOCAL] 모든 접근 허용 (개발 편의)
            # allow 127.0.0.1;
            # allow 192.168.0.0/16;
            # deny all;

            # [PROD] 내부 네트워크만 허용
            # allow 127.0.0.1;
            # allow 관리자_VPN_IP;
            # deny all;

            set $upstream_backend http://backend:8000;
            proxy_pass $upstream_backend;
            proxy_set_header Host $host;
        }

        # Auth API ──────────────────────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            set $upstream_backend http://backend:8000;
            proxy_pass $upstream_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $real_client_ip;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        # Backend API ───────────────────────────────────────────────
        location /api/ {
            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;
            limit_req zone=api burst=50 nodelay;
            set $upstream_backend http://backend:8000;
            proxy_pass $upstream_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $real_client_ip;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        # MinIO presigned URL proxy ─────────────────────────────────
        location /3dgs-platform/ {
            limit_req zone=minio burst=200 nodelay;
            set $upstream_minio http://minio:9000;
            proxy_pass $upstream_minio$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_buffering off;
            client_max_body_size 0;
        }

        # Backend WebSocket ─────────────────────────────────────────
        location /api/ws {
            set $upstream_ws http://backend:8000;
            proxy_pass $upstream_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $real_client_ip;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_read_timeout 86400;
        }
    }
}
