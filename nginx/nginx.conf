worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    client_max_body_size 0;

    # ── 실제 클라이언트 IP ───────────────────────────────────────────────
    # NPM Plus를 통해 전달되는 CF-Connecting-IP 헤더 사용
    # (NPM Plus가 Cloudflare로부터 받은 실제 방문자 IP를 그대로 전달)
    map $http_cf_connecting_ip $real_client_ip {
        ""      $remote_addr;
        default $http_cf_connecting_ip;
    }

    # ── Rate Limiting ────────────────────────────────────────────────────
    limit_req_zone $real_client_ip zone=api:10m rate=30r/s;
    limit_req_zone $real_client_ip zone=auth:10m rate=30r/m;
    limit_req_zone $real_client_ip zone=minio:10m rate=100r/s;

    # ── HTTP 서버 ────────────────────────────────────────────────────────
    # SSL은 NPM Plus가 종료. 이 서버는 HTTP(80)만 처리
    server {
        listen 80;
        server_name _;

        resolver 127.0.0.11 valid=10s;

        # Frontend (Next.js)
        location / {
            set $upstream_frontend http://frontend:3000;
            proxy_pass $upstream_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $real_client_ip;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # Next.js HMR WebSocket (개발 시)
        location /_next/webpack-hmr {
            set $upstream_frontend http://frontend:3000;
            proxy_pass $upstream_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Swagger 내부 전용 (외부 도메인 차단)
        location /api/docs {
            allow 127.0.0.1;       # localhost                                                                                                                                            
            allow 192.168.0.0/16;  # internal network                                                                                                                                  
            deny all;                                                                                                                                                           
            set $upstream_backend http://backend:8000;
            proxy_pass $upstream_backend;
            proxy_set_header Host $host;
        }

        location /api/openapi.json {
            allow 127.0.0.1;       # localhost                                                                                                                                            
            allow 192.168.0.0/16;  # internal network                                                                                                                                  
            deny all;                                                                                                                                                           
            set $upstream_backend http://backend:8000;
            proxy_pass $upstream_backend;
            proxy_set_header Host $host;
        }

        # Auth API (Rate Limit 강화)
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            set $upstream_backend http://backend:8000;
            proxy_pass $upstream_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $real_client_ip;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # Backend API
        location /api/ {
            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;
            limit_req zone=api burst=50 nodelay;
            set $upstream_backend http://backend:8000;
            proxy_pass $upstream_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $real_client_ip;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # MinIO presigned URL proxy
        # proxy_pass에 URI suffix를 붙이면 nginx가 경로를 정규화해서 presigned URL 서명 검증 실패
        # $request_uri 사용으로 원본 URI(인코딩 포함) 그대로 전달
        location /3dgs-platform/ {
            limit_req zone=minio burst=200 nodelay;
            set $upstream_minio http://minio:9000;
            proxy_pass $upstream_minio$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_buffering off;
            client_max_body_size 0;
        }

        # Backend WebSocket
        location /api/ws {
            set $upstream_ws http://backend:8000/ws;
            proxy_pass $upstream_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_read_timeout 86400;

        }
    }
}

